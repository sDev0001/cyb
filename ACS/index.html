<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>3DS StepUp Tester</title>
  <style>
      body {
          font-family: Arial, sans-serif;
          background: #f6f6f6;
          padding: 20px;
      }
      textarea {
          width: 100%;
          height: 120px;
      }
      button {
          padding: 10px 20px;
          margin-top: 10px;
          cursor: pointer;
      }
      iframe {
          width: 100%;
          height: 520px;
          border: 1px solid #ccc;
          margin-top: 20px;
          background: #fff;
      }
  </style>
</head>
<body>

<h2>3DS StepUp (Cardinal / CyberSource)</h2>

<label>AccessToken (JWT)</label>
<textarea id="jwt" placeholder="Paste AccessToken JWT aici..."></textarea>

<button onclick="start3DS()">Start 3DS</button>

<iframe name="stepup_iframe"></iframe>

<form id="stepupForm"
      method="POST"
      target="stepup_iframe"
      action="https://centinelapistag.cardinalcommerce.com/V2/Cruise/StepUp">

  <input type="hidden" name="JWT" id="jwtInput">
  <input type="hidden" name="MD" value="test-3ds-flow">

</form>

<script>
  function start3DS() {
    const jwt = document.getElementById('jwt').value.trim();
    if (!jwt) {
      alert('AccessToken (JWT) lipseste');
      return;
    }
    document.getElementById('jwtInput').value = jwt;
    document.getElementById('stepupForm').submit();
  }
</script>

</body>
</html>
